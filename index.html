<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYM SYSTEM PRO | v38.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ffb6c1; --bg: #000; --card: #111; --text: #fff; --border: #222; }
        [data-theme="light"] { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); font-family: 'Quicksand', sans-serif; color: var(--text); min-height: 100vh; }

        /* Login Section */
        #login-gate { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 5000; padding: 20px; }
        .login-box { width: 100%; max-width: 350px; text-align: center; background: #0a0a0a; padding: 30px; border-radius: 25px; border: 1px solid #222; }
        .input-group { position: relative; margin: 20px 0; }
        #passInput { background: #111; border: 1px solid #333; color: white; width: 100%; padding: 15px; text-align: center; border-radius: 12px; outline: none; font-size: 16px; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; filter: grayscale(1); }

        /* Layout */
        #main-os { display: none; min-height: 100vh; }
        .sidebar { width: 300px; background: var(--bg); border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; height: 100vh; z-index: 1000; text-align: center; }
        .avatar-frame { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 20px; overflow: hidden; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-link { width: 100%; padding: 15px; margin: 8px 0; background: none; border: none; color: var(--text); text-align: left; cursor: pointer; font-weight: 700; border-radius: 12px; opacity: 0.5; display: flex; align-items: center; gap: 10px; }
        .nav-link.active { opacity: 1; background: var(--accent); color: #000; }

        .content { margin-left: 300px; padding: 50px; flex: 1; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 30px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; text-decoration: none; color: inherit; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .label { font-size: 0.7rem; opacity: 0.5; font-family: 'Syncopate'; display: block; margin-bottom: 5px; }
        .copy-hint { font-size: 0.6rem; font-weight: 800; background: var(--accent); color: #000; padding: 4px 8px; border-radius: 6px; visibility: hidden; }
        .card:hover .copy-hint { visibility: visible; }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content { margin-left: 0; padding: 20px; }
            #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid #222; z-index: 2000; padding: 10px; justify-content: space-around; }
            .tab-item { background: none; border: none; color: #fff; font-size: 1.2rem; opacity: 0.4; }
            .tab-item.active { opacity: 1; color: var(--accent); }
            body { padding-bottom: 80px; }
        }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 6000; }
    </style>
</head>
<body data-theme="dark">

<div id="toast">✅ GEKOPIEERD!</div>

<div id="login-gate">
    <div class="login-box">
        <h2 style="font-family:'Syncopate'; letter-spacing:5px; font-size:18px;">SYM LOGIN</h2>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Wachtwoord">
            <button class="eye-btn" onclick="toggleEye()">👁️</button>
        </div>
        <button style="width:100%; background:var(--accent); color:#000; border:none; padding:15px; border-radius:15px; font-weight:800; cursor:pointer;" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div id="main-os">
    <div class="sidebar">
        <div class="avatar-frame"><img src="" id="side-img"></div>
        <div id="nav-list"></div>
        <button onclick="toggleTheme()" style="margin-top:20px; background:#222; border:none; color:#fff; padding:8px 15px; border-radius:20px; font-size:10px; cursor:pointer;">🌓 THEMA</button>
    </div>

    <div class="content">
        <div id="profile-header">
            <h1 id="p-name" style="font-family:'Syncopate'; font-size:1.8rem;"></h1>
            <p id="p-desc" style="color:var(--accent); font-weight:700; margin-bottom:30px;"></p>
        </div>
        <div class="info-grid" id="p-grid"></div>
    </div>

    <div id="mobile-tabs" style="display:none;"></div>
</div>

<script>
    const db = {
        yara: {
            name: "💖 Yara Lotfallah 💖",
            desc: "The love of Mohamed and his future wife, Insh’Allah",
            img: "https://i.ibb.co/cX12LkTh/IMG-4587.jpg",
            color: "#ffb6c1",
            data: [
                {l: "📞 Telefoon", v: "+31 6 82070842", type: "tel"},
                {l: "📍 Adres", v: "Kobbeduinen 38", type: "copy"},
                {l: "📮 Postcode", v: "2134 ZM", type: "copy"},
                {l: "🎵 TikTok 1", v: "@y.1378", type: "link", url: "https://www.tiktok.com/@y.1378"},
                {l: "🎵 TikTok 2", v: "@backupyara12", type: "link", url: "https://www.tiktok.com/@backupyara12"},
                {l: "🎵 TikTok 3", v: "@yara.4261", type: "link", url: "https://www.tiktok.com/@yara.4261"},
                {l: "👻 Snapchat", v: "@yara2024299210", type: "link", url: "https://www.snapchat.com/add/yara2024299210"},
                {l: "🎮 Roblox", v: "@yaraaaaaaaaaa129", type: "link", url: "https://www.roblox.com/users/9073849744/profile"}
            ]
        },
        skye: {
            name: "💎 Skye Denrooijen",
            desc: " Best Friend van Yara ",
            img: "https://i.ibb.co/cP9NCp6/image.png",
            color: "#00d2ff",
            data: [
                {l: "📞 Telefoon", v: "+31 6 87312203", type: "tel"},
                {l: "🏠 Adres", v: "Onbekend", type: "copy"},
                {l: "📍 Stad", v: "Hoofddorp", type: "copy"},
                {l: "🎵 TikTok", v: "@skye56791", type: "link", url: "https://www.tiktok.com/@skye56791"},
                {l: "👻 Snapchat", v: "@skye_denrooijen", type: "link", url: "https://www.snapchat.com/add/skye_denrooijen"},
                {l: "🎮 Roblox", v: "@Skyedenrooijen", type: "link", url: "https://www.roblox.com/users/10143701421/profile"}
            ]
        },
        david: {
            name: "🕴️ David Lotfallah",
            desc: "Vader van Yara // Manager van Burger 'n Shake ",
            img: "https://i.ibb.co/nqMj0K2G/IMG-4585.jpg",
            color: "#ffffff",
            data: [
                {l: "💼 Werk", v: "Manager bij Burger 'n Shake", type: "copy"},
                {l: "📸 Instagram", v: "@lotfalladavid", type: "link", url: "https://www.instagram.com/lotfalladavid"},
                {l: "📘 Facebook", v: "davidlotfalla", type: "link", url: "https://www.facebook.com/davidlotfalla"}
            ]
        }
    };

    function toggleEye() { const p = document.getElementById('passInput'); p.type = p.type === 'password' ? 'text' : 'password'; }

    function checkLogin() {
        if(document.getElementById('passInput').value === 'mo love yara') {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-os').style.display = 'block';
            initApp();
        } else { alert('Verkeerd Wachtwoord!'); }
    }

    function initApp() {
        const nav = document.getElementById('nav-list');
        const mobNav = document.getElementById('mobile-tabs');
        if(window.innerWidth <= 768) mobNav.style.display = 'flex';

        let navItems = "";
        let mobItems = "";
        
        for (let key in db) {
            navItems += `<button class="nav-link" onclick="loadTab('${key}', this)"><span>${key === 'yara' ? '💖' : key === 'skye' ? '💎' : '🕴️'}</span> ${db[key].name.split(' ')[1]}</button>`;
            mobItems += `<button class="tab-item" onclick="loadTab('${key}', this)">${key === 'yara' ? '💖' : key === 'skye' ? '💎' : '🕴️'}</button>`;
        }
        nav.innerHTML = navItems;
        mobNav.innerHTML = mobItems;
        loadTab('yara', nav.firstChild);
    }

    function loadTab(id, btn) {
        const user = db[id];
        document.querySelectorAll('.nav-link, .tab-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('side-img').src = user.img;
        document.getElementById('p-name').innerText = user.name;
        document.getElementById('p-desc').innerText = user.desc;
        document.documentElement.style.setProperty('--accent', user.color);

        const grid = document.getElementById('p-grid');
        grid.innerHTML = user.data.map(item => `
            <div class="card" onclick="handleAction('${item.type}', '${item.v}', '${item.url || ''}')">
                <div><span class="label">${item.l}</span><span class="val">${item.v}</span></div>
                <span class="copy-hint">${item.type === 'link' ? 'OPEN' : 'COPY'}</span>
            </div>
        `).join('');
    }

    function handleAction(type, val, url) {
        if(type === 'link') { window.open(url, '_blank'); }
        else {
            navigator.clipboard.writeText(val);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        }
    }

    function toggleTheme() {
        document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }
</script>
</body>
</html>
